services:
  web:
    working_dir: /var/www/html
    build: .
    volumes:
      - /Users/ralph/Documents/golf-front-end.nosync:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/php.ini
    ports:
      - 80:80
  database:
    image: mariadb:latest
    volumes:
      - /Users/ralph/Documents/Docker Databases/Golf2:/var/lib/mysql
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 3306:3306
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      - PMA_HOST=database
    volumes:
      # This line maps your local config file to the container's custom config path
      - ./phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php
